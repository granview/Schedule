<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <title>勤務管理システム</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- ==================================================
     LOGIN
=================================================== -->

    <div id="loginPage">

        <h2>勤務管理システム</h2>

        <input type="text" id="loginId" placeholder="ID">

        <input type="password" id="loginPassword" placeholder="Password">

        <button id="loginBtn">
            ログイン
        </button>

    </div>

    <!-- ==================================================
     MAIN PAGE
=================================================== -->

    <div id="mainPage" style="display:none;">

        <header>

            <h2 id="welcomeText">
                Welcome
            </h2>

            <button id="logoutBtn">
                Logout
            </button>

        </header>

        <!-- MENU -->

        <div class="menu">

            <button id="scheduleTabBtn">
                勤務表
            </button>

            <button id="leaveTabBtn">
                希望休
            </button>

        </div>

        <!-- SCHEDULE -->

        <div id="scheduleTab">

            <div class="toolbar">

                <button id="editScheduleBtn" style="display:none;">
                    編集
                </button>

                <button id="saveScheduleBtn" style="display:none;">
                    保存
                </button>

            </div>

            <div id="scheduleContainer">
            </div>

        </div>

        <!-- LEAVE -->

        <div id="leaveTab" style="display:none;">

            <div id="leaveContainer">
            </div>

        </div>

    </div>

    <script type="module" src="js/app.js"></script>

</body>

</html>
