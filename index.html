<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <title>勤務管理システム</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- ==================================================
     LOGIN
=================================================== -->

    <div id="loginPage">

        <h2>勤務管理システム</h2>

        <input type="text" id="loginId" placeholder="ID">

        <input type="password" id="loginPassword" placeholder="Password">

        <button id="loginBtn">
            ログイン
        </button>

    </div>

    <!-- ==================================================
     MAIN PAGE
=================================================== -->

    <div id="mainPage" style="display:none;">

        <header>

            <h2 id="welcomeText">
                Welcome
            </h2>

            <button id="logoutBtn">
                Logout
            </button>

        </header>

        <!-- MENU -->

        <div class="menu">

            <button id="scheduleTabBtn">
                勤務表
            </button>

            <button id="leaveTabBtn">
                希望休
            </button>

        </div>

        <!-- SCHEDULE -->

        <div id="scheduleTab">

            <div class="toolbar">
                <button id="createPeriodBtn">
                    次期作成
                </button>
                <button id="publishBtn">
                    決定
                </button>
                <button id="editScheduleBtn" style="display:none;">
                    編集
                </button>

                <button id="saveScheduleBtn" style="display:none;">
                    保存
                </button>


            </div>
            <div id="periodList"></div>

            <div id="scheduleContainer">
            </div>

        </div>

        <!-- LEAVE -->

        <div id="leaveTab" style="display:none;">

            <div id="leaveContainer">
            </div>


        </div>

    </div>

    <div id="loadingOverlay"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.7); z-index:9999; justify-content:center; align-items:center; flex-direction:column;">
        <div class="spinner"
            style="border: 5px solid #f3f3f3; border-top: 5px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;">
        </div>
        <p style="font-weight:bold; color:#333; margin-top:10px;">Loading...</p>
    </div>

    <style>
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
    <script type="module" src="js/app.js"></script>

</body>

</html>
